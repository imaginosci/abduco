on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        ./configure
        make

    - name: Test
      run: |
        make test
