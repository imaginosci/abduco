on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Test
      uses: vmactions/solaris-vm@v1
      with:
        usesh: true
        release: 11.4-gcc
        run: |
          ./configure
          gmake
