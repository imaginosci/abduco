on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Test
      uses: vmactions/openbsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg_add gmake
        run: |
          ./configure
          gmake
          gmake test
